<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced HTML</title>
</head>
<body>

    <header>
        <h1>Student Profile</h1>
    </header>

    <!-- Navigation -->
    <nav>
        <a href="#">Home</a> |
        <a href="#">Profile</a> |
        <a href="#">Contact</a>
    </nav>

    <!-- Main Content -->
    <article>
        <section>
            <!-- Local Image (upload this to GitHub) -->
            <img src="profile.png" alt="Profile Picture" width="150">

            <!-- Table -->
            <table border="1">
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Major</th>
                </tr>
                <tr>
                    <td>John Doe</td>
                    <td>21</td>
                    <td>Computer Science</td>
                </tr>
                <tr>
                    <td>Jane Smith</td>
                    <td>22</td>
                    <td>Engineering</td>
                </tr>
                <tr>
                    <td>Mike Johnson</td>
                    <td>20</td>
                    <td>Mathematics</td>
                </tr>
                <tr>
                    <td>Sarah Lee</td>
                    <td>23</td>
                    <td>Physics</td>
                </tr>
            </table>
        </section>
    </article>

    <!-- Form -->
    <section>
        <form>
            <label>Name:</label>
            <input type="text" name="name"><br><br>

            <!-- Radio buttons -->
            <label>Gender:</label><br>
            <input type="radio" name="gender"> Male<br>
            <input type="radio" name="gender"> Female<br><br>

            <!-- Checkbox -->
            <input type="checkbox"> Subscribe to newsletter<br><br>

            <!-- Textarea -->
            <label>Comments:</label><br>
            <textarea rows="4" cols="30"></textarea><br><br>

            <input type="submit" value="Submit">
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 Student Profile Page</p>
    </footer>

</body>
</html>
